<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C3 Sensor Setup</title>
    
    <!-- Use Google Fonts -->
    <style>
        :root {
            --bg-color: #020617;
            --panel-bg: rgba(30, 41, 59, 0.6);
            --panel-border: rgba(51, 65, 85, 0.5);
            --accent: #22d3ee;
            --accent-glow: rgba(34, 211, 238, 0.3);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --radius-lg: 16px;
            --font-sans: 'Inter', system-ui, sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-sans);
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius-lg);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            padding: 20px;
            margin-bottom: 20px;
        }
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 800px;
            margin: 0 auto;
        }
        header { padding: 20px; text-align: center; border-bottom: 1px solid var(--panel-border); }
        h1 { color: var(--accent); font-size: 24px; }
        .main-content { flex: 1; padding: 20px; overflow-y: auto; padding-bottom: 80px; }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; color: var(--text-dim); font-size: 14px; }
        input[type="text"], input[type="password"], select {
            width: 100%; padding: 12px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--panel-border);
            border-radius: 8px; color: white;
            font-size: 16px; font-family: var(--font-sans);
            transition: all 0.2s ease;
        }
        input[type="text"]:focus, input[type="password"]:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
        select option { background-color: var(--bg-color); color: white; }
        .btn {
            width: 100%; padding: 14px;
            border: none; border-radius: 8px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--accent); color: #020617; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        
        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
            border-top: 1px solid var(--panel-border);
            display: flex; justify-content: space-around; padding: 10px 0; padding-bottom: env(safe-area-inset-bottom, 10px);
            z-index: 100;
        }
        .nav-btn {
            background: none; border: none; color: var(--text-dim);
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            font-size: 12px; cursor: pointer; transition: color 0.2s; flex: 1;
        }
        .nav-btn.active { color: var(--accent); }
        .nav-btn svg { width: 24px; height: 24px; }
        
        .chart-container { position: relative; height: 300px; width: 100%; margin-top: 20px;}
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; margin-top: 10px; }
        .status-on { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid #10b981; }
        .status-off { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }
    </style>

</head>
<body>
    <div class="app-container">
        <header>
            <h1>C3 Sensor Setup</h1>
            <div id="ws-status" class="status-badge status-off">Disconnesso</div>
        </header>

        <main class="main-content">
            <!-- TAB DASHBOARD -->
            <section id="tab-dashboard" class="tab-content active">
                <div class="glass-panel">
                    <h3>Sensori Live</h3>
                    <div style="display:flex; justify-content:space-between; margin-top:15px;">
                        <div>
                            <div style="color:var(--text-dim); font-size:12px;">Encoder</div>
                            <div id="val-enc" style="font-size:24px; font-weight:bold; color:#a855f7;">0</div>
                        </div>
                        <div style="text-align:right;">
                            <div style="color:var(--text-dim); font-size:12px;">Laser (mm)</div>
                            <div id="val-laser" style="font-size:24px; font-weight:bold; color:#fb7185;">0</div>
                        </div>
                    </div>
                    <div style="display:flex; justify-content:center; margin-top:20px;">
                        <div style="text-align:center;">
                            <div style="color:var(--text-dim); font-size:12px;">Battito (BPM)</div>
                            <div id="val-hr" style="font-size:32px; font-weight:bold; color:#ef4444;">0</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- TAB SETUP -->
            <section id="tab-setup" class="tab-content">
                <div class="glass-panel">
                    <h3>Indirizzo MAC (S3)</h3>
                    <div class="form-group" style="margin-top:15px;">
                        <label>MAC Address Master (S3)</label>
                        <input type="text" id="cfg-mac" placeholder="AE:27:6E:CB:F4:30" maxlength="17">
                    </div>
                    <button class="btn btn-primary" id="btn-save-mac" style="margin-top:10px;">SALVA MAC</button>
                </div>
                
                <div class="glass-panel">
                    <h3>Configurazione di Rete</h3>
                    <div class="form-group" style="margin-top:15px;">
                        <label>Wi-Fi SSID (Home)</label>
                        <div style="display:flex; gap:10px;">
                            <select id="cfg-ssid" style="flex:1;">
                                <option value="">Nessuna (Usa Modalità AP)</option>
                            </select>
                            <button class="btn btn-outline" style="width:auto; padding:0 15px; font-size:12px;" onclick="if(ws && ws.readyState === WebSocket.OPEN) ws.send('SCAN'); this.innerText='...'; setTimeout(() => this.innerText='SCAN', 3000);" type="button">SCAN</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Wi-Fi Password</label>
                        <input type="password" id="cfg-pass" placeholder="Password">
                    </div>
                    <button class="btn btn-primary" id="btn-save-wifi" style="margin-top:10px;">SALVA E CONNETTI WI-FI</button>
                    <p style="margin-top:15px; font-size:12px; color:var(--text-dim); text-align:center;">
                        Encoder: Pin A=2, B=3<br>ToF VL53L0X: SDA=8, SCL=9
                    </p>
                </div>
            </section>

            <!-- TAB OTA -->
            <section id="tab-ota" class="tab-content">
                <div class="glass-panel">
                    <h3>Aggiornamento Firmware</h3>
                    <p style="color:var(--text-dim); font-size:14px; margin-bottom:20px;">Carica il file .bin compilato per aggiornare la scheda senza collegare il cavo USB.</p>
                    <form method="POST" action="/update" enctype="multipart/form-data" id="ota-form">
                        <input type="file" name="update" id="ota-file" style="margin-bottom:15px; padding:10px;">
                        <button type="submit" class="btn btn-outline" id="btn-ota">FLASH FIRMWARE</button>
                    </form>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button class="nav-btn active" data-target="tab-dashboard">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span>Live</span>
            </button>
            <button class="nav-btn" data-target="tab-setup">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                <span>Setup</span>
            </button>
            <button class="nav-btn" data-target="tab-ota">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                <span>Aggiorna</span>
            </button>
        </nav>
    </div>

    <script>
        // Navigation
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.target).classList.add('active');
            });
        });

        // WebSocket
        let ws;
        function connectWS() {
            const wsUrl = `ws://${window.location.hostname}/ws`;
            ws = new WebSocket(wsUrl);
            ws.onopen = () => {
                const b = document.getElementById('ws-status');
                b.textContent = 'Connesso';
                b.className = 'status-badge status-on';
                ws.send('GET_CFG');
            };
            ws.onclose = () => {
                const b = document.getElementById('ws-status');
                b.textContent = 'Disconnesso';
                b.className = 'status-badge status-off';
                setTimeout(connectWS, 2000);
            };
            ws.onmessage = (e) => {
                if (e.data.startsWith('CFG:')) {
                    const parts = e.data.substring(4).split(',');
                    if (parts.length >= 3) {
                        document.getElementById('cfg-mac').value = parts[0];
                        const elSsid = document.getElementById('cfg-ssid');
                        if (elSsid) {
                            let found = false;
                            for (let i = 0; i < elSsid.options.length; i++) {
                                if (elSsid.options[i].value === parts[1]) { found = true; break; }
                            }
                            if(!found && parts[1] !== "") {
                                const opt = document.createElement('option');
                                opt.value = parts[1]; opt.text = parts[1] + " (Salvata)";
                                elSsid.appendChild(opt);
                            }
                            elSsid.value = parts[1];
                        }
                        
                        document.getElementById('cfg-pass').value = parts[2];
                    }
                } else if (e.data.startsWith('WIFI_LIST:')) {
                    const ssidList = e.data.substring(10).split(',');
                    const sel = document.getElementById('cfg-ssid');
                    if (sel) {
                        const currentVal = sel.value;
                        sel.innerHTML = '<option value="">Nessuna (Usa Modalità AP)</option>';
                        let currentValRestored = false;
                        
                        ssidList.forEach(ssid => {
                            if (ssid.trim() !== '') {
                                const option = document.createElement('option');
                                option.value = ssid; option.text = ssid;
                                sel.appendChild(option);
                                if(ssid === currentVal) currentValRestored = true;
                            }
                        });
                        
                        if(!currentValRestored && currentVal !== "") {
                            const option = document.createElement('option');
                            option.value = currentVal; option.text = currentVal + " (Fuori portata)";
                            sel.appendChild(option);
                        }
                        sel.value = currentVal;
                    }
                } else if (e.data.startsWith('SYNC:')) {
                    // SYNC:encoderTicks,laserMm
                    const parts = e.data.substring(5).split(',');
                    if (parts.length >= 2) {
                        const enc = parseInt(parts[0]);
                        const las = parseInt(parts[1]);
                        
                        document.getElementById('val-enc').textContent = enc;
                        document.getElementById('val-laser').textContent = las;
                    }
                    if (parts.length >= 3) {
                        const hr = parseInt(parts[2]);
                        document.getElementById('val-hr').textContent = hr;
                    }
                }
            };
        }
        connectWS();

        // Save Config
        document.getElementById('btn-save-mac').addEventListener('click', () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const mac = document.getElementById('cfg-mac').value;
                const ssid = document.getElementById('cfg-ssid').value;
                const pass = document.getElementById('cfg-pass').value;
                ws.send(`CFG:${mac},${ssid},${pass}`);
                alert('MAC Address salvato!');
            } else {
                alert('WebSocket non connesso!');
            }
        });

        document.getElementById('btn-save-wifi').addEventListener('click', () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const mac = document.getElementById('cfg-mac').value;
                const ssid = document.getElementById('cfg-ssid').value;
                const pass = document.getElementById('cfg-pass').value;
                ws.send(`CFG:${mac},${ssid},${pass}`);
                setTimeout(() => {
                    if (ws && ws.readyState === WebSocket.OPEN) ws.send('REBOOT');
                    alert('Riavvio in corso... La scheda cercherà di connettersi al Wi-Fi.');
                }, 500);
            } else {
                alert('WebSocket non connesso!');
            }
        });
        
        document.getElementById('ota-form').addEventListener('submit', function() {
            document.getElementById('btn-ota').textContent = 'CARICAMENTO...';
        });
    </script>
</body>
</html>
