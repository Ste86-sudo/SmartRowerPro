# Arduino CLI sketch profile — install dependencies with:
#   arduino-cli lib install --config-file sketch.yaml
#
# Built-in ESP32 core libraries (no manual install needed):
#   WiFi, ArduinoOTA, Update, SPI, Preferences, BLEDevice/BLEServer/BLEUtils/BLE2902

profiles:
  default:
    fqbn: esp32:esp32:esp32
    platforms:
      - platform: esp32:esp32
        platform_index_url: https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
    libraries:
      - name: AsyncTCP
        version: 3.3.9
      - name: ESPAsyncWebServer
        version: 3.7.6
      - name: ADS1220_WE
        version: 1.0.6
